<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>try{var t=localStorage.getItem('theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark')}catch(e){}</script>
    <title>Вход — Rockfile</title>
    <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <script src="/assets/js/strip-token-from-url.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-content">
        <a class="logo" href="/index.html">
          <img src="/assets/img/favicon.svg" alt="" class="logo-img" width="32" height="32" />
          Rockfile
        </a>
        <nav class="nav">
          <a class="nav-link" href="index.html">Главная</a>
          <a class="nav-link is-active" href="login.html">Вход</a>
          <button id="theme-toggle" class="theme-toggle" aria-label="Тёмная тема"><span class="theme-icon">🌙</span></button>
        </nav>
      </div>
    </header>

    <main class="auth-page">
      <section class="auth-card">
        <h1>Вход в аккаунт</h1>
        <p class="muted">Введите email и пароль для доступа к картотеке.</p>
        <form id="login-form" class="form">
          <label class="field">
            <span>Email</span>
            <input type="email" name="email" placeholder="you@example.com" required />
          </label>
          <label class="field">
            <span>Пароль</span>
            <input type="password" name="password" placeholder="********" required />
          </label>
          <button class="button" type="submit">Войти</button>
          <p id="login-message" class="form-message"></p>
        </form>

        <div class="divider"></div>

        <h2>Регистрация</h2>
        <p class="muted">Создайте аккаунт, чтобы начать вести картотеку.</p>
        <form id="register-form" class="form">
          <label class="field">
            <span>Имя пользователя</span>
            <input type="text" name="username" placeholder="ivan" required />
          </label>
          <label class="field">
            <span>Имя</span>
            <input type="text" name="first_name" placeholder="Ivan" />
          </label>
          <label class="field">
            <span>Фамилия</span>
            <input type="text" name="last_name" placeholder="Ivanov" />
          </label>
          <label class="field">
            <span>Email</span>
            <input type="email" name="email" placeholder="ivan@example.com" required />
          </label>
          <label class="field">
            <span>Пароль</span>
            <input type="password" name="password" placeholder="********" required />
          </label>
          <label class="field">
            <span>Название tenant</span>
            <input type="text" name="tenant_name" placeholder="Ivan Corp" />
          </label>
          <button class="button" type="submit">Создать аккаунт</button>
          <p id="register-message" class="form-message"></p>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-content">
        <p class="footer-line">
          <span id="footer-year"></span>
          <span class="footer-sep"> · </span>
          <span class="footer-about">Private project.</span>
          <span class="footer-sep"> · </span>
          <span class="footer-contact">Если есть вопросы или предложения, напишите мне в <a href="https://t.me/old_healer">Telegram</a>.</span>
        </p>
      </div>
    </footer>

    <script type="module" src="/assets/js/auth.js?v=1"></script>
  </body>
</html>

<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>try{var t=localStorage.getItem('theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark')}catch(e){}</script>
    <title>Вход — Rockfile</title>
    <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <script src="/assets/js/strip-token-from-url.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-content">
        <a class="logo" href="/index.html">
          <img src="/assets/img/favicon.svg" alt="" class="logo-img" width="32" height="32" />
          Rockfile
        </a>
        <nav class="nav">
          <a class="nav-link" href="index.html">Главная</a>
          <button id="theme-toggle" class="theme-toggle" aria-label="Тёмная тема"><span class="theme-icon">🌙</span></button>
        </nav>
      </div>
    </header>

    <main class="auth-page">
      <div class="auth-card">
        <div class="auth-brand">
          <img src="/assets/img/favicon.svg" alt="" width="40" height="40" />
          <span>Rockfile</span>
        </div>

        <div class="auth-tabs">
          <button class="auth-tab auth-tab--active" data-tab="login">Вход</button>
          <button class="auth-tab" data-tab="register">Регистрация</button>
        </div>

        <div class="auth-tab-panel" data-panel="login">
          <p class="auth-desc muted">Войдите, чтобы открыть свою картотеку.</p>
          <form id="login-form" class="form auth-form">
            <label class="field">
              <span>Email</span>
              <input type="email" name="email" placeholder="you@example.com" required autocomplete="email" />
            </label>
            <label class="field">
              <span>Пароль</span>
              <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
            </label>
            <button class="button auth-submit" type="submit">Войти</button>
          </form>
        </div>

        <div class="auth-tab-panel" data-panel="register" hidden>
          <p class="auth-desc muted">Создайте аккаунт, чтобы начать вести картотеку.</p>
          <form id="register-form" class="form auth-form">
            <div class="auth-form-row">
              <label class="field">
                <span>Имя</span>
                <input type="text" name="first_name" placeholder="Иван" autocomplete="given-name" />
              </label>
              <label class="field">
                <span>Фамилия</span>
                <input type="text" name="last_name" placeholder="Иванов" autocomplete="family-name" />
              </label>
            </div>
            <label class="field">
              <span>Email</span>
              <input type="email" name="email" placeholder="ivan@example.com" required autocomplete="email" />
            </label>
            <label class="field">
              <span>Имя пользователя</span>
              <input type="text" name="username" placeholder="ivan" required autocomplete="username" />
            </label>
            <label class="field">
              <span>Пароль</span>
              <input type="password" name="password" placeholder="••••••••" required autocomplete="new-password" />
            </label>
            <label class="field">
              <span>Организация <span class="field-hint">(необязательно)</span></span>
              <input type="text" name="tenant_name" placeholder="Ivan Corp" autocomplete="organization" />
            </label>
            <button class="button auth-submit" type="submit">Создать аккаунт</button>
          </form>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-content">
        <p class="footer-line">
          <span id="footer-year"></span>
          <span class="footer-sep"> · </span>
          <span class="footer-about">Private project.</span>
          <span class="footer-sep"> · </span>
          <span class="footer-contact">Если есть вопросы, напишите в <a href="https://t.me/old_healer">Telegram</a>.</span>
        </p>
      </div>
    </footer>

    <script type="module" src="/assets/js/auth.js?v=2"></script>
  </body>
</html>

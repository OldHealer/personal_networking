<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>try{var t=localStorage.getItem('theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark')}catch(e){}</script>
    <title>Ошибка авторизации — Rockfile</title>
    <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-content">
        <a class="logo" href="/index.html">
          <img src="/assets/img/favicon.svg" alt="" class="logo-img" width="32" height="32" />
          Rockfile
        </a>
        <nav class="nav">
          <a class="nav-link" href="/index.html">Главная</a>
          <a class="nav-link" href="/login.html">Вход</a>
          <button id="theme-toggle" class="theme-toggle" aria-label="Тёмная тема"><span class="theme-icon">🌙</span></button>
        </nav>
      </div>
    </header>

    <main class="auth-page">
      <section class="auth-card">
        <h1>Не удалось авторизоваться</h1>
        <p class="muted">
          Проверьте данные и попробуйте снова. Если ошибка повторяется,
          обратитесь к администратору.
        </p>
        <div class="hero-actions">
          <a class="button" href="/login.html">Попробовать еще раз</a>
          <a class="button button-outline" href="/index.html">На главную</a>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-content">
        <p class="footer-line">
          <span id="footer-year"></span>
          <span class="footer-sep"> · </span>
          <span class="footer-about">Private project.</span>
          <span class="footer-sep"> · </span>
          <span class="footer-contact">Если есть вопросы или предложения, напишите мне в <a href="https://t.me/old_healer">Telegram</a>.</span>
        </p>
      </div>
    </footer>

    <script type="module" src="/assets/js/main.js"></script>
  </body>
</html>
